<!DOCTYPE html>
<html>
<head>
    <title>AJAX DataTable Date Filter</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<style>
    body{
        font-family: sans-serif;
    }
    h2{
        text-align: center;
        color:darkslategray;
        font-size: 34px;
        font-weight:600;
    }
    .date{
        font-size: 18px;
        font-weight: 600;
    }
    input{
        padding: 3px;
        font-size: 15px;
        margin-left:10px;
        margin-right:10px;
    }
    button{
        padding:5px;
        font-size: 15px;
        margin-left:10px;
        background-color: black;
        color:#fff;
        cursor:pointer;
    }
    table{
        font-size:18px;
        padding:30px;
    }
</style>
<body>

<h2 >Users List</h2>

<!-- Date Filter -->
 <div class="date">
    Start Date:
    <input type="date" id="start_date">
    End Date:
    <input type="date" id="end_date">

     <button id="submitBtn">Submit</button>
 </div>

<table id="userTable" class="display" style="width:100%">
    <thead>
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Age</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Date</th>
        </tr>
    </thead>
</table>

<script>
$(document).ready(function () {

    // JSON Data 
    var jsonData = [
        { id: 1, user: "Allen", age:"38",email: "allen@gmail.com", mobile: "9876543210", date: "2026-02-01" },
        { id: 2, user: "Bhuvi", age:"32",email: "bhuvi@gmail.com", mobile: "9876543211", date: "2026-02-05" },
        { id: 3, user: "Chahar", age:"28",email: "chahar@gmail.com", mobile: "9876543212", date: "2026-02-10" },
        { id: 4, user: "Dhoni", age:"44",email: "dhoni@gmail.com", mobile: "9876543213", date: "2026-02-15" },
        { id: 5, user: "Ellis", age:"26",email: "ellis@gmail.com", mobile: "9876543214", date: "2026-02-20" },
    ];

    // Initialize DataTable
    var table = $('#userTable').DataTable({
        data: jsonData,
        columns: [
            { data: 'id' },
            { data: 'user' },
            { data: 'age' },
            { data: 'email' },
            { data: 'mobile' },
            { data: 'date' }
        ]
    });

    $.fn.dataTable.ext.search.push(
        function (settings, data, dataIndex) {

            var startDate = $('#start_date').val();
            var endDate = $('#end_date').val();
            var rowDate = data[5]; //

            if (!startDate && !endDate) {
                return true;
            }

            var row = new Date(rowDate);
            var start = startDate ? new Date(startDate) : null;
            var end = endDate ? new Date(endDate) : null;

            if (start && row < start) {
                return false;
            }
            if (end && row > end) {
                return false;
            }
            return true;
        }
    );
    $('#submitBtn').on('click', function () {
        table.draw();
    });

});
</script>
</body>
</html>
