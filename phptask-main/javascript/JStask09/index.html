<!DOCTYPE html>
<html>

<head>
    <title>Show Current Date and Time</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="card-body">
    <script src="asset/scripts.js"></script>
    <div class="container-fluid m-5">
        <div class="d-flex justify-content-center">
            <form class="card text-bg-light mb-3 " style="width: 33%;">
                <div class="card-body ">

                    <h2 for="validationTextarea" class="form-label">Show Current Date and Time</h2>
                    <div id="div">
                        <div id="current-year"></div>
                        <div id="current-month"></div>
                        <div id="current-date"></div>
                        <div id="current-hour"></div>
                        <div id="current-minute"></div>
                        <div id="current-seconds"></div>
                        <div id="current-millisec"></div>
                        <div id="local-date-timer"></div>
                        <div id="utc"></div>
                        <div id="utc-milliseconds"></div>
                        <div id="indian"></div>
                    </div>

                    <!-- <button onclick="showDateTime()">Show</button> -->
                    <div class="card-body">

                        <button onclick="showDateTime()" type="button" class="btn btn-success"
                            id="submit-btn ">Submit</button>
                        <button onclick="resetResult()" type="button" class="btn btn-secondary "
                            id="reset-btn">Reset</button>
                    </div>
</body>

</html>
