<!DOCTYPE html>
<html>

<head>
    <title>Sum and Multiply</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="card-body">
    <script src="asset/scripts.js"></script>
    <div class="container-fluid m-5">
        <div class="d-flex justify-content-center">

            <form class="card text-bg-light mb-3 " style="width: 33%;">
                <div class="card-body ">
                    <h4 for="validationTextarea" class="form-label">Sum and Multiply</h4>
                    <div style="width: 60%;">
                        <!-- Input -->
                        <input type="text" id="user-input" placeholder="Enter values like 1,2,3,4"
                            class="form-control mb-0 ">
                        <div id="error-msg" style="color: red;"></div>
                        <input type="text" id="result-msg" style="color: green;" class="form-control mt-3">
                    </div>
                </div>
                <div class="card-body">
                    <!-- Buttons -->
                    <button type="button" onclick="process('add')" class="btn btn-success" id="sum-btn">Add</button>
                    <button type="button" onclick="process('multiply')" class="btn btn-secondary ">Multiply</button>
                    <button type="button" onclick="resetform()" class="btn btn-secondary" id="reset-btn">Reset</button>
                </div>
            </form>


</body>

</html>
