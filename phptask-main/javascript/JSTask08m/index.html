<!DOCTYPE html>
<html>

<head>
    <title>Add / Replace Element in Array</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="card-body">
    <div class="container-fluid m-5">
        <div class="d-flex justify-content-center">
            <form class="card text-bg-light mb-3 " style="width: 33%;">
                <div class="card-body ">
                    <h4 for="validationTextarea" class="form-label">Add / Replace Element in Array</h4>

                    <!-- First input -->
                    <div>
                        <input type="text" id="user-input-one" placeholder="Enter elements like A,B,C,D"
                            class="form-control mb-2" style="width: 60%;">
                        <div id="arrayerror" style="color: red;"></div>

                    </div>
                    <!-- Second input -->
                    <div>
                        <input type="text" id="user-input-two" placeholder="Enter position (starts from 1)"
                            class="form-control mb-2" style="width: 60%;">
                        <div id="positionerror" style="color: red;"></div>

                    </div>
                    <!-- Third input -->
                    <div>
                        <input type="text" id="user-input-three" placeholder="Enter new element"
                            class="form-control mb-2 " style="width: 60%;">
                        <div id="elementerror" style="color: red;"></div>
                    </div>

                </div>
                <!-- Action button -->

                <div class="card-body">
                    <button onclick="replaceElement()" type="button" class="btn btn-success"
                        id="submit-btn">Submit</button>
                    <button onclick="resetform()" type="button" class="btn btn-secondary" id="reset-btn">Reset</button>
                </div>
                <div class="card-body">
                    <div id="result-msg" style="color: green;"></div>
                </div>
            </form>
            <script src="asset/scripts.js"></script>
</body>

</html>
